version: '3.8'

services:
  # Next.js Application
  app:
    build: .
    container_name: jcaesar-app
    restart: always
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://jcaesar_user:jcaesar_password@db:5432/jcaesar_db
      - REDIS_URL=redis://redis:6379
    env_file:
      - .env
    depends_on:
      - db
      - redis

  # Background Worker (Crawl & Social Channels)
  worker:
    build: .
    container_name: jcaesar-worker
    restart: always
    command: npm run start:worker # Ensure this command is defined in package.json
    environment:
      - DATABASE_URL=postgresql://jcaesar_user:jcaesar_password@db:5432/jcaesar_db
      - REDIS_URL=redis://redis:6379
    env_file:
      - .env
    depends_on:
      - db
      - redis

  # Database: PostgreSQL + pgvector
  db:
    image: ankane/pgvector:latest
    container_name: jcaesar-db
    restart: always
    environment:
      - POSTGRES_DB=jcaesar_db
      - POSTGRES_USER=jcaesar_user
      - POSTGRES_PASSWORD=jcaesar_password
    ports:
      - "5432:5432"
    volumes:
      - jcaesar_db_data:/var/lib/postgresql/data

  # Redis for Queues
  redis:
    image: redis:7-alpine
    container_name: jcaesar-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - jcaesar_redis_data:/data

volumes:
  jcaesar_db_data:
  jcaesar_redis_data:
